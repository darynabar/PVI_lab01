<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <header class="main-header">
        <div class="logo">
            <button class="burger" id="burger" aria-label="Toggle navigation menu">☰</button>
            <a href="Students.html" aria-label="Go to Content Management System homepage">CMS</a>
        </div>
    
        <div class="user-profile">
            <div class="notification-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bell-icon"
                    viewBox="0 0 16 16" role="img" aria-label="Notifications">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6" />
                </svg>
                <span class="dot" aria-hidden="true"></span>
    
                <div class="message-dropdown">
                    <ul>
                        <li>
                            <img src="./image/avatar.jpg" alt="Avatar of Nastia" class="avatar-image">
                            <div class="user-block">
                                <span class="name-avatar">Nastia</span>
                                <p class="user-message">Lorem ipsum.</p>
                            </div>
                        </li>
                        <li>
                            <img src="./image/avatar.jpg" alt="Avatar of Nastia" class="avatar-image">
                            <div class="user-block">
                                <span class="name-avatar">Nastia</span>
                                <p class="user-message">Lorem ipsum dolor sit.</p>
                            </div>
                        </li>
                        <li>
                            <img src="./image/avatar.jpg" alt="Avatar of Nastia" class="avatar-image">
                            <div class="user-block">
                                <span class="name-avatar">Nastia</span>
                                <p class="user-message">Lorem ipsum dolor sit.</p>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
    
            <div class="user-dropdown">
                <div class="user-info">
                    <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor"
                        class="bi bi-person-circle" viewBox="0 0 16 16" role="img" aria-label="User Profile Icon">
                        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                        <path fill-rule="evenodd"
                            d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                    </svg>
                    <span class="user-name" id="current-user">Baranova Daryna</span>
                </div>
    
                <div class="user-profile log">
                    <ul>
                        <li>Profile</li>
                        <li>Log Out</li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="sitebar-content">
            <div class="sitebar">
                <aside>
                    <nav class="nav-sitebar">
                        <a class="link-sitebar" href="index.html">Dashboard</a>
                        <a class="link-sitebar" href="Students.html">Students</a>
                        <a class="link-sitebar" href="Tasks.html">Tasks</a>
                    </nav>
                </aside>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

</html>
